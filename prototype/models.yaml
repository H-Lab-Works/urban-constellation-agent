# Prototype model configuration.
# These values document the intended production direction; the checked-in Python
# prototype uses deterministic mock tools so it can run without model weights.

stgcn:
  history_steps: 12
  prediction_steps: 3
  city_nodes: 300
  channels: [1, 16, 32, 64, 32, 128]
  learning_rate: 0.001
  epochs: 50
  batch_size: 16
  model_save_path: "trained_models/stgcn_model.pth"

synthetic_control:
  outcome_variable: "flow_index"
  pre_policy_min_periods: 2
  default_policy_year: 2021

rag:
  document_path: "config/rag_documents.json"
  top_k: 3

api:
  host: "127.0.0.1"
  port: 5050

